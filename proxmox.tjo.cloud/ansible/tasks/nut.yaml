- name: Install nut
  ansible.builtin.apt:
    name: nut-client
    state: present

- name: Template nut config files
  ansible.builtin.template:
    src: "root/etc/nut/{{ item }}"
    dest: "/etc/nut/{{ item }}"
    mode: "0644"
    owner: "root"
    group: "root"
  loop:
    - "nut.conf"
    - "upsmon.conf"
  notify:
    - Restart nut-client

- name: Start and enable nut-client
  ansible.builtin.systemd:
    name: "nut-client"
    state: started
    enabled: true

- name: Copy wol service
  ansible.builtin.template:
    src: root/etc/systemd/system/wol@.service
    dest: /etc/systemd/system/wol@.service
    mode: '0644'
    owner: root
    group: root

- name: Enable wol service
  ansible.builtin.systemd:
    name: 'wol@{{ item }}'
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - enp1s0
    - enp2s0
