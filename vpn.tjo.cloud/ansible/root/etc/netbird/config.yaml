server:
  listenAddress: ":8080"
  exposedAddress: "https://vpn.tjo.cloud:443"
  stunPorts:
    - 3478
  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"

  authSecret: "{{ netbird_relay_auth_secret }}"
  dataDir: "/var/lib/netbird"

  auth:
    issuer: "https://vpn.tjo.cloud/oauth2"
    signKeyRefreshEnabled: true
    dashboardRedirectURIs:
      - "https://vpn.tjo.cloud/nb-auth"
      - "https://vpn.tjo.cloud/nb-silent-auth"
    cliRedirectURIs:
      - "http://localhost:53000/"

  reverseProxy:
    trustedHTTPProxies:
      - "fd6a:e0a3:bb4b:c6b3::1/128"

  store:
    engine: "sqlite"
    encryptionKey: "{{ netbird_datastore_encryption_key }}"
