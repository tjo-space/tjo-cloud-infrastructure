---
- name: Configure vpn.tjo.cloud
  hosts: all

  vars_files:
    - vars.yaml
    - vars.terraform.yaml
    - vars.terraform.secrets.yaml
    - vars.secrets.yaml

  handlers:
  - name: Restart netbird
    ansible.builtin.systemd:
      name:
        - netbird-dashboard
        - netbird-server
      state: restarted

  tasks:
    - name: Run defaults
      ansible.builtin.import_role:
        name: default
      vars:
        version: "{{ tjo_cloud_version }}"
        ssh_keys: "{{ tjo_cloud_admin_ssh_keys }}"
        configure_resolved: true

    - name: Install and Configure Observability
      ansible.builtin.import_tasks:
        file: tasks/observability.yaml

    - name: Install and Configure Firewall
      ansible.builtin.import_tasks:
        file: tasks/firewall.yaml

    - name: Deploy vpn
      ansible.builtin.import_tasks:
        file: tasks/vpn.yaml

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers
