# TODO: Ansible Template Files

- name: Configure
  ansible.builtin.shell: |
    #!/bin/bash
    set -eou pipefail

    echo "- OPKG Update"
    opkg update

    echo "- Tailscale"
    apk add tailscale

    echo "- Tools"
    apk add tcpdump htop bind-dig

    echo "- Qemu agent"
    apk add qemu-ga

    echo "- Installing Bird (BGP, Router Advertisement NDP)"
    apk add bird3 bird3c

    echo "- Installing Kea (DHCPv4, DHCPv6)"
    apk add kea-dhcp4 kea-dhcp6 kea-uci kea-lfc
    rm /etc/config/kea-opkg || true

    echo "- Installing unbound (DNS, DNS64)"
    apk add luci-app-unbound unbound-control adblock
    opkg remove --autoremove dnsmasq odhcpd odhcpd-ipv6only

    echo "- Installing jool (NAT64)"
    apk add kmod-veth ip-full kmod-jool-netfilter jool-tools-netfilter
    chmod +x /etc/jool/setup.sh
    /etc/jool/setup.sh

    echo "- Installing wireguard"
    apk add wireguard-tools luci-proto-wireguard

    echo "- Installing Yggdrasil"
    apk add yggdrasil luci-proto-yggdrasil yggdrasil-jumper

    echo "- Reloading Services"
    service bird reload
    service kea reload
    service network reload
    sleep 5
    service firewall reload
    service unbound reload
    service adblock reload

    echo "- Tailscale up"
    tailscale up \
      --reset \
      --accept-dns=false \
      --ssh=true \
      --advertise-routes="10.0.0.0/10,fd74:6a6f::/32,10.100.0.0/16,fd9b:7c3d:7f6a::/48" \
      --accept-routes=false \
      --snat-subnet-routes=true \
      --advertise-exit-node \
      --advertise-tags="tag:network-tjo-cloud"

    echo "- Done!"
